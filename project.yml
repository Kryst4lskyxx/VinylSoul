name: VinylSoul
options:
  bundleIdPrefix: com.vinylsoul
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  VinylSoul:
    type: application
    platform: iOS
    sources:
      - path: VinylSoul
    info:
      path: VinylSoul/Info.plist
    entitlements:
      path: VinylSoul/VinylSoul.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vinylsoul.app
        UIBackgroundModes: ["audio"]

  VinylSoulWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: VinylSoulWidget
      - path: VinylSoul/Models
      - path: VinylSoul/Persistence
      - path: VinylSoul/App/Color+Hex.swift
    info:
      path: VinylSoulWidget/Info.plist
    entitlements:
      path: VinylSoul/VinylSoul.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vinylsoul.app.widget

  VinylSoulTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VinylSoulTests
    dependencies:
      - target: VinylSoul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vinylsoul.tests
        GENERATE_INFOPLIST_FILE: "YES"

  VinylSoulUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VinylSoulUITests
    dependencies:
      - target: VinylSoul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vinylsoul.uitests
        GENERATE_INFOPLIST_FILE: "YES"
